# Render configuration file (Blueprint API)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: advanta-yoma-integration
    env: node
    region: oregon # You can change this to the region closest to your users
    plan: free # Change to a paid plan for production
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: YOMA_API_URL
        value: https://api.yoma.world/api/v3
      - key: YOMA_AUTH_URL
        value: https://yoma.world/auth/realms/yoma
      - key: ADVANTA_TOKEN
        value: test-token # Mock value from webhook.test.js
      - key: YOMA_CLIENT_ID
        value: mock-client-id # Mock value for testing
      - key: YOMA_CLIENT_SECRET
        value: mock-client-secret # Mock value for testing
    autoDeploy: true 